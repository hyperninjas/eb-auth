name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck / lint / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eb_auth
          POSTGRES_PASSWORD: eb_auth
          POSTGRES_DB: eb_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eb_auth -d eb_auth"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3000
      CORS_ORIGIN: http://localhost
      BETTER_AUTH_SECRET: ci-test-secret-at-least-32-characters-long
      BETTER_AUTH_URL: http://localhost:3000
      DATABASE_URL: postgresql://eb_auth:eb_auth@localhost:5432/eb_auth
      REDIS_URL: redis://localhost:6379
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
