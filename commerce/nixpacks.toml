# Nixpacks build configuration — used by Dokploy (and any other Nixpacks-based
# platform) for the Medusa v2 commerce backend.
#
# This is the production-grade pipeline the Dockerfile comment called out:
#   `medusa build` → .medusa/server  →  `medusa start`
# The local Dockerfile uses `medusa develop` (no compile step) for fast
# iteration; here we compile properly and run from the compiled output.

[phases.setup]
# Pin Node 24 to match the dev Dockerfile. Medusa only requires >=20 but
# staying on 24 keeps parity with the eb-auth service and avoids surprises.
# python3 / gnumake / gcc are required for native addons (sharp, argon2, etc.)
# that Medusa's transitive deps may compile from source.
# postgresql gives us psql in the start command to create the database if it
# doesn't exist — `medusa db:migrate` expects the database to already exist
# and will crash on first boot if it isn't there.
nixPkgs = ["nodejs_24", "python3", "gnumake", "gcc", "postgresql"]

[phases.install]
cmds = ["npm install --no-fund --no-audit --loglevel=warn"]

[phases.build]
# Medusa's admin dashboard build (Vite) is extremely memory-hungry — it was
# hitting the default ~1 GB V8 heap limit and OOM-crashing at ~975 MB.
# 4 GB is enough headroom for the full frontend + backend compile.
# This only affects the build container, not the running server.
cmds = ["NODE_OPTIONS=--max-old-space-size=4096 npm run build"]

[start]
# 1. ensure-db.sh: creates the database if it doesn't exist — idempotent,
#    no-op on every deploy after the first. psql connects to the `postgres`
#    maintenance database on the same host to run CREATE DATABASE.
# 2. db:migrate: applies any pending Medusa migrations — also idempotent.
# 3. npm start: serves the compiled output in .medusa/server.
cmd = "sh scripts/ensure-db.sh && npm run db:migrate && npm start"

[variables]
NODE_ENV = "production"
# Bind to all interfaces so the load balancer / reverse proxy can reach the
# container. Matches the HOST=0.0.0.0 set in the dev Dockerfile.
HOST     = "0.0.0.0"
PORT     = "9000"
# Pin the clock to UTC — every Medusa timestamp (orders, sessions, audit logs)
# lands in the shared Postgres in UTC and stays comparable with eb-auth rows.
TZ       = "UTC"
