# Nixpacks build configuration for the Medusa v2 commerce backend.
#
# Build output: `medusa build` compiles everything into .medusa/server/ which
# is a self-contained production artifact with its own package.json listing
# only runtime deps. We install prod-only deps there during the build phase
# and copy it to /medusa-server (outside /app) so it survives Nixpacks'
# final COPY . /app layer (Docker opaque-dir whiteout erases /app contents
# from earlier layers). At runtime we restore it with a fast cp and run the
# medusa CLI directly from /medusa-server/node_modules/.bin — devDeps are
# never needed at runtime.
#
# Node module caching: Nixpacks mounts /root/.npm as a BuildKit cache so npm
# package downloads are reused across builds. We additionally cache
# /app/node_modules so the full install (1312 packages, ~5 min) is skipped
# when package.json hasn't changed.

[phases.setup]
nixPkgs = ["nodejs_24", "python3", "gnumake", "gcc", "postgresql"]

[phases.install]
cmds = ["npm install --no-fund --no-audit --loglevel=warn"]
# Cache the installed node_modules between builds — invalidated automatically
# when the Docker layer for `COPY . /app` changes (i.e. when package.json or
# package-lock.json changes). Cuts the install step from ~5 min to seconds
# on cache hit.
cacheDirectories = ["/root/.npm", "/app/node_modules"]

[phases.build]
# 1. Compile backend + bundle admin dashboard (Vite needs 2 GB heap).
# 2. Install ONLY production deps inside .medusa/server — this trims the
#    runtime from 1312 packages (devDeps included) down to only what the
#    server actually needs.
# 3. Copy to /medusa-server (outside /app) to survive the Nixpacks opaque-dir
#    layer problem described above.
cmds = [
  "NODE_OPTIONS=--max-old-space-size=2048 npm run build",
  "cd .medusa/server && npm install --omit=dev --no-fund --no-audit --loglevel=warn",
  "cp -r .medusa/server /medusa-server"
]

[start]
cmd = "sh scripts/start.sh"

[variables]
NODE_ENV = "production"
HOST     = "0.0.0.0"
PORT     = "9000"
TZ       = "UTC"
